    <!-- favicon.ico first: Bing (and other crawlers) do not support SVG favicons
         and look for a real .ico at the domain root. Modern browsers still prefer
         the SVG below via the type hint. Apple needs a PNG, not SVG. -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" sizes="any" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- The session check fires on every page load; warming the API origin
         saves a DNS+TLS round-trip (~300ms on mobile) off that request. -->
    <link rel="preconnect" href="https://api.ministryofpapers.com" crossorigin />
    <!-- Loaded non-blocking (media="print" + onload flip) so fonts stay off the
         critical render path. Split by family so display can differ:
         - Fraunces (serif DISPLAY font, headings) uses display=optional. Its
           metrics differ a lot from any fallback, so a late swap reflows every
           heading and cascades the whole page (and the footer) downward — that
           was ~all of the field/lab CLS. `optional` never swaps mid-page: it
           uses the font only if it arrives in the first ~100ms, else the
           fallback for that view. Zero font-driven layout shift.
         - DM Sans (body) keeps display=swap: its metrics are close to the system
           sans fallback, so the swap barely shifts, and body text always shows in
           the brand font. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;0,9..144,800;1,9..144,300;1,9..144,600&display=optional"
      media="print"
      onload="this.media='all';this.onload=null"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap"
      media="print"
      onload="this.media='all';this.onload=null"
    />

      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" />
